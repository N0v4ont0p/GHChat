<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHchat</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #1f2937 0%, #0b0e14 45%, #05070b 100%);
        color: #e5e7eb;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      }
      .card {
        text-align: center;
        padding: 24px 28px;
        border-radius: 18px;
        background: rgba(17, 24, 39, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }
      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 0.95rem;
      }
      .hint {
        margin-top: 10px;
        color: #94a3b8;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Starting GHchat…</h1>
      <p>Booting the bundled Next.js runtime.</p>
      <p class="hint" id="status"></p>
    </div>

    <script>
      const target = 'http://127.0.0.1:3210';
      const statusNode = document.getElementById('status');
      const startedAt = Date.now();
      const maxWaitMs = 20000;

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      async function waitForServer() {
        while (true) {
          try {
            await fetch(target, { method: 'HEAD', cache: 'no-store', mode: 'no-cors' });
            window.location.replace(target);
            return;
          } catch {
            if (Date.now() - startedAt > maxWaitMs && statusNode) {
              statusNode.textContent =
                'Still waiting for the local server. Ensure Node.js is installed and restart GHchat.';
            }
            await sleep(400);
          }
        }
      }

      waitForServer();
    </script>
  </body>
</html>
