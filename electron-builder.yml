appId: com.n0v4ont0p.ghchat
productName: GHchat
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
asarUnpack:
  - node_modules/sql.js/dist/sql-wasm.wasm
mac:
  identity: null
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip
  minimumSystemVersion: "13.0"
  darkModeSupport: true
dmg:
  title: GHchat ${version}
  background: null
  window:
    width: 600
    height: 400
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
asar: true
