appId: com.n0v4ont0p.ghchat
productName: GHchat
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
# sql-wasm.wasm cannot live inside the asar archive because it must be read
# directly from the filesystem at runtime.  extraResources copies it next to
# the asar archive (into Contents/Resources/ on macOS) so that locateSqlJsWasm()
# in database.ts can resolve it via process.resourcesPath.
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
mac:
  identity: null
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip
  minimumSystemVersion: "13.0"
  darkModeSupport: true
dmg:
  title: GHchat ${version}
  background: null
  window:
    width: 600
    height: 400
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
asar: true
